<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Panel de control · Yuwa / Head Spa Systems</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;1,9..144,300&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0A; --bg2:#101010; --panel:#141414; --line:#262626;
    --text:#F4F2ED; --muted:#8A8A85; --soft:#BFBDB6;
    --lima:#C4D82E; --lima-dim:#9AAD22; --alerta:#C46A2E;
    --serif:'Fraunces',Georgia,serif; --grot:'Inter',system-ui,sans-serif;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:var(--bg);color:var(--text);font-family:var(--grot);font-weight:300;-webkit-font-smoothing:antialiased}
  .wrap{max-width:1100px;margin:0 auto;padding:32px 28px 48px}
  .head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;padding-bottom:22px;border-bottom:1px solid var(--line)}
  .eyebrow{font-size:11px;letter-spacing:.34em;text-transform:uppercase;color:var(--lima)}
  .h1{font-family:var(--serif);font-size:38px;line-height:1.05;margin-top:8px}
  .periodo-box{display:flex;align-items:center;gap:10px;padding-bottom:4px}
  .periodo-box label{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  select{background:var(--panel);color:var(--text);border:1px solid var(--line);font-family:var(--grot);font-size:13px;padding:9px 14px;cursor:pointer;letter-spacing:.02em}
  select:focus{outline:1px solid var(--lima-dim)}
  .alerta{margin-top:22px;padding:14px 18px;background:rgba(196,106,46,.08);border:1px solid rgba(196,106,46,.28);border-radius:4px;font-size:13.5px;color:var(--soft);display:flex;gap:12px;align-items:flex-start}
  .alerta .tri{color:var(--alerta);flex-shrink:0}
  .alerta b{color:var(--text)} .alerta .roas{color:var(--alerta)}
  .kpis{margin-top:24px;display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:1px;background:var(--line);border:1px solid var(--line)}
  .kpi{background:var(--bg);padding:22px 22px 20px}
  .kpi .lbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .kpi .val{font-family:var(--serif);font-size:38px;line-height:1;margin-top:12px;color:var(--text)}
  .kpi .val.accent{color:var(--lima)} .kpi .val.warn{color:var(--alerta)}
  .kpi .sub{font-size:12px;color:var(--muted);margin-top:8px}
  .tabs{display:flex;gap:4px;margin-top:30px}
  .tab{background:transparent;color:var(--muted);border:1px solid transparent;border-bottom:none;padding:10px 22px;font-size:12px;letter-spacing:.08em;text-transform:uppercase;font-family:var(--grot);font-weight:500;cursor:pointer}
  .tab.on{background:var(--panel);color:var(--text);border-color:var(--line)}
  .body{border:1px solid var(--line);background:var(--bg2);padding:28px 24px}
  .sec{font-size:11px;letter-spacing:.18em;text-transform:uppercase;color:var(--lima)}
  .leyenda{display:flex;gap:24px;margin-top:8px;font-size:12px;color:var(--muted);flex-wrap:wrap}
  .leyenda span{display:flex;align-items:center;gap:8px}
  .dot{width:12px;height:12px;border-radius:2px;display:inline-block}
  .eco{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:1px;margin-top:18px;background:var(--line);border:1px solid var(--line)}
  .eco .cell{background:var(--bg);padding:18px 18px}
  .eco .lbl{font-size:10px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted)}
  .eco .val{font-family:var(--serif);font-size:28px;margin-top:9px;line-height:1}
  .eco .val.accent{color:var(--lima)} .eco .val.warn{color:var(--alerta)}
  .eco .nota{font-size:11px;color:var(--muted);margin-top:7px;line-height:1.5}
  .pnl{margin-top:18px;border:1px solid var(--line);background:var(--bg)}
  .pnl .row{display:flex;justify-content:space-between;align-items:baseline;padding:13px 22px;border-bottom:1px solid var(--line);font-size:14px}
  .pnl .row:last-child{border-bottom:none}
  .pnl .row .k{color:var(--soft)}
  .pnl .row .v{font-family:var(--grot);font-variant-numeric:tabular-nums}
  .pnl .row.neg .v{color:var(--alerta)}
  .pnl .row.sub{background:var(--bg2)}
  .pnl .row.sub .k{color:var(--muted);font-size:13px}
  .pnl .row.sub .v{color:var(--text)}
  .pnl .row.total{padding:18px 22px}
  .pnl .row.total .k{font-family:var(--serif);font-size:18px;color:var(--text)}
  .pnl .row.total .v{font-family:var(--serif);font-size:32px;line-height:1}
  .pnl .row.total .v.pos{color:var(--lima)}
  .pnl .row.total .v.negc{color:var(--alerta)}
  .pnl .mrg{font-size:11px;color:var(--muted);margin-left:10px;font-family:var(--grot)}
  .fuentes{display:grid;grid-template-columns:1fr 1fr;gap:1px;margin-top:32px;background:var(--line);border:1px solid var(--line)}
  .fuente{background:var(--bg);padding:20px 22px}
  .fuente .lbl{font-size:10.5px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
  .fuente .lbl.accent{color:var(--lima)}
  .fuente .val{font-family:var(--serif);font-size:32px;margin-top:10px;line-height:1}
  .fuente .nota{font-size:12px;color:var(--muted);margin-top:8px}
  .bar-row{margin-bottom:16px}
  .bar-top{display:flex;justify-content:space-between;font-size:13px;margin-bottom:6px}
  .bar-top .name{color:var(--soft)} .bar-top .num{color:var(--muted)}
  .bar-track{height:8px;background:var(--panel);border-radius:2px}
  .bar-fill{height:100%;background:var(--lima);border-radius:2px}
  table{width:100%;border-collapse:collapse;font-size:13px;min-width:760px}
  th{font-size:10.5px;letter-spacing:.1em;text-transform:uppercase;color:var(--muted);font-weight:500;border-bottom:1px solid var(--line);padding:10px 12px;text-align:right}
  th:first-child{text-align:left}
  td{padding:12px 12px;border-bottom:1px solid var(--line);color:var(--soft);text-align:right}
  td:first-child{text-align:left}
  td.bold{color:var(--text);font-weight:500}
  td.accent{color:var(--lima)} td.warn{color:var(--alerta)}
  .scroll{overflow-x:auto}
  .foot{margin-top:18px;font-size:11.5px;color:var(--muted);line-height:1.7}
  .hidden{display:none}
</style>
</head>
<body>
<div class="wrap">
  <div class="head">
    <div>
      <div class="eyebrow">Yuwa &middot; Head Spa Systems</div>
      <div class="h1">Panel de control</div>
    </div>
    <div class="periodo-box">
      <label for="sel-periodo">Per&iacute;odo</label>
      <select id="sel-periodo"></select>
    </div>
  </div>
  <div class="alerta hidden" id="alerta"><span class="tri">&#9650;</span><span id="alerta-txt"></span></div>
  <div id="estado" style="margin-top:22px;font-size:13.5px;color:var(--muted)"></div>
  <div class="kpis" id="kpis"></div>
  <div class="tabs">
    <button class="tab on" data-tab="resumen">Resumen</button>
    <button class="tab" data-tab="medios">Por medio</button>
  </div>
  <div class="body">
    <div id="tab-resumen"></div>
    <div id="tab-medios" class="hidden"></div>
  </div>
  <div class="foot" id="foot">Datos en vivo desde Google Sheets &middot; Google Ads convertido a USD &middot; <span id="last-sync"></span></div>
</div>
<script>
/* ============================================================
   PANEL DE CONTROL - YUWA / HEAD SPA SYSTEMS
   Lectura en vivo desde Google Sheets (1 vez al abrir).
   ------------------------------------------------------------
   CONFIG: editá solo este bloque si cambian IDs o tipo de cambio.
   ============================================================ */

const SHEET_ID = "1TrNtA4sqejYN3Qg67bTYWAbEOY7SNcE_slVyRbhtL_E";
const SOLAPA_GOOGLE = "Google Ads";
const SOLAPA_META   = "Meta Ads";
const SOLAPA_VENTAS = "Ventas";

const TIPO_CAMBIO = 1500;          // ARS por USD (solo aplica a Google Ads)

// Comisiones Hotmart
const TARIFA_HOTMART_PCT = 10;
const COMISION_PCT = TARIFA_HOTMART_PCT; // para break-even / P&L

/* ============================================================
   FIN DEL BLOQUE EDITABLE
   ============================================================ */

var NETO = 1 - COMISION_PCT/100;
var BREAKEVEN = NETO>0 ? 1/NETO : Infinity;

function fmtUSD(n){ return "$" + Math.round(n).toLocaleString("en-US"); }
function fmtNum(n){ return Math.round(n).toLocaleString("es-AR"); }
function fmtX(n){ return isFinite(n) ? n.toFixed(2)+"\u00D7" : "\u2014"; }
function fmtPct(n){ return isFinite(n) ? n.toFixed(2)+"%" : "\u2014"; }

/* ---------- Lectura de Google Sheets via gviz ---------- */
function gvizURL(solapa){
  return "https://docs.google.com/spreadsheets/d/"+SHEET_ID+
         "/gviz/tq?tqx=out:json&sheet="+encodeURIComponent(solapa);
}

function parseGviz(text){
  // gviz devuelve: /*O_o*/google.visualization.Query.setResponse({...});
  var start = text.indexOf("{");
  var end = text.lastIndexOf("}");
  var json = JSON.parse(text.substring(start, end+1));
  var cols = json.table.cols.map(function(c){ return (c.label||c.id||"").trim(); });
  var rows = json.table.rows.map(function(r){
    var o = {};
    r.c.forEach(function(cell, i){
      var key = cols[i] || ("col"+i);
      o[key] = cell ? (cell.v !== null && cell.v !== undefined ? cell.v : "") : "";
    });
    return o;
  });
  return { cols: cols, rows: rows };
}

function fetchSolapa(solapa){
  return fetch(gvizURL(solapa)).then(function(r){
    if(!r.ok) throw new Error("No se pudo leer la solapa "+solapa+" (HTTP "+r.status+")");
    return r.text();
  }).then(parseGviz);
}

/* ---------- Normalización de fechas ---------- */
// gviz puede devolver fechas como "Date(2026,5,21)" (mes 0-based) o como string.
function toDate(v){
  if(v === null || v === undefined || v === "") return null;
  if(v instanceof Date) return v;
  if(typeof v === "string"){
    var m = v.match(/^Date\((\d+),(\d+),(\d+)/);
    if(m){ return new Date(+m[1], +m[2], +m[3]); }
    var d = new Date(v);
    return isNaN(d) ? null : d;
  }
  return null;
}
function diasAtras(d){
  var hoy = new Date(); hoy.setHours(0,0,0,0);
  var dd = new Date(d); dd.setHours(0,0,0,0);
  return Math.round((hoy - dd)/86400000);
}
function num(v){
  if(typeof v === "number") return v;
  if(typeof v === "string"){
    var n = parseFloat(v.replace(/[^0-9.\-]/g,""));
    return isNaN(n)?0:n;
  }
  return 0;
}

/* ---------- Construcción de datos por período ---------- */
var RAW = { google: [], meta: [], ventas: [] };

function getCampo(obj, candidatos){
  // busca la primera key que matchee (case-insensitive, ignora espacios/underscores)
  var keys = Object.keys(obj);
  for(var i=0;i<candidatos.length;i++){
    var c = candidatos[i].toLowerCase().replace(/[\s_]/g,"");
    for(var j=0;j<keys.length;j++){
      if(keys[j].toLowerCase().replace(/[\s_]/g,"") === c) return obj[keys[j]];
    }
  }
  return "";
}

function construirPeriodo(maxDias){
  // Filtra filas dentro del rango y agrega por medio
  function dentro(d){ var n = diasAtras(d); return n>=0 && n<maxDias; }

  // GOOGLE (costo en ARS -> USD)
  var gG = 0, gImp = 0, gClk = 0;
  RAW.google.forEach(function(r){
    var d = toDate(getCampo(r,["Fecha","date"]));
    if(!d || !dentro(d)) return;
    gG   += num(getCampo(r,["Costo","cost","spend"]))/TIPO_CAMBIO;
    gImp += num(getCampo(r,["Impresiones","impressions"]));
    gClk += num(getCampo(r,["Clics","clicks"]));
  });

  // META (ya en USD)
  var mG = 0, mImp = 0, mClk = 0;
  RAW.meta.forEach(function(r){
    var d = toDate(getCampo(r,["date","Fecha"]));
    if(!d || !dentro(d)) return;
    mG   += num(getCampo(r,["spend","Amount Spent","Costo"]));
    mImp += num(getCampo(r,["impressions","Impresiones"]));
    mClk += num(getCampo(r,["clicks","Clics"]));
  });

  // VENTAS (Hotmart, USD) — no atribuibles a medio
  var vCount = 0, vIngresos = 0;
  RAW.ventas.forEach(function(r){
    var d = toDate(getCampo(r,["Fecha","date","order_date"]));
    if(!d || !dentro(d)) return;
    vCount   += 1;
    vIngresos += num(getCampo(r,["Valor","value","price"]));
  });

  var medios = [
    { medio:"Meta Ads",   gasto:mG, impresiones:mImp, clics:mClk, ventas:0, ingresos:0 },
    { medio:"Google Ads", gasto:gG, impresiones:gImp, clics:gClk, ventas:0, ingresos:0 },
  ];

  // Serie temporal: agrupar por día (rango corto) o por semana (rango largo)
  var serie = construirSerie(maxDias);

  return {
    medios: medios,
    organico: { ventas: vCount, ingresos: vIngresos }, // todas las ventas van acá (sin atribución)
    serie: serie
  };
}

function construirSerie(maxDias){
  // buckets: si <=14 días -> por día; si <=70 -> por semana; si más -> por mes aprox
  var buckets = [];
  function gastoDelDia(n){
    var g = 0;
    RAW.google.forEach(function(r){
      var d = toDate(getCampo(r,["Fecha","date"]));
      if(d && diasAtras(d)===n) g += num(getCampo(r,["Costo","cost","spend"]))/TIPO_CAMBIO;
    });
    RAW.meta.forEach(function(r){
      var d = toDate(getCampo(r,["date","Fecha"]));
      if(d && diasAtras(d)===n) g += num(getCampo(r,["spend","Amount Spent"]));
    });
    return g;
  }
  function ingresoDelDia(n){
    var ing = 0;
    RAW.ventas.forEach(function(r){
      var d = toDate(getCampo(r,["Fecha","date"]));
      if(d && diasAtras(d)===n) ing += num(getCampo(r,["Valor","value"]));
    });
    return ing;
  }

  if(maxDias<=14){
    var dl=["D","L","M","X","J","V","S"]; // por día de semana
    for(var n=maxDias-1; n>=0; n--){
      var fecha=new Date(); fecha.setDate(fecha.getDate()-n);
      buckets.push({ dia: dl[fecha.getDay()], gasto: gastoDelDia(n), ingresos: ingresoDelDia(n) });
    }
  } else {
    // agrupar en ~4-12 tramos
    var tramos = maxDias<=35 ? Math.ceil(maxDias/7) : Math.min(12, Math.ceil(maxDias/15));
    var tam = Math.ceil(maxDias/tramos);
    for(var t=tramos-1; t>=0; t--){
      var g=0, ing=0;
      for(var k=0;k<tam;k++){
        var nn = t*tam + k;
        if(nn<maxDias){ g+=gastoDelDia(nn); ing+=ingresoDelDia(nn); }
      }
      var label = maxDias<=35 ? ("Sem "+(tramos-t)) : ("T"+(tramos-t));
      buckets.push({ dia: label, gasto: g, ingresos: ing });
    }
  }
  return buckets;
}

/* ---------- Cálculos (idéntico al original) ---------- */
function calc(P){
  var gastoTotal   = P.medios.reduce(function(a,x){return a+x.gasto;},0);
  var ventasPago   = P.medios.reduce(function(a,x){return a+x.ventas;},0);
  var ingresosPago = P.medios.reduce(function(a,x){return a+x.ingresos;},0);
  var imprTotal    = P.medios.reduce(function(a,x){return a+x.impresiones;},0);
  var clicsTotal   = P.medios.reduce(function(a,x){return a+x.clics;},0);
  var ingresosTotal = ingresosPago + P.organico.ingresos;
  var ventasTotal   = ventasPago + P.organico.ventas;
  var roasBlended   = gastoTotal>0 ? ingresosTotal/gastoTotal : Infinity;
  var roasPago      = gastoTotal>0 ? ingresosPago/gastoTotal : Infinity;
  var roasNeto      = gastoTotal>0 ? (ingresosPago*NETO)/gastoTotal : Infinity;
  var aov           = ventasTotal>0 ? ingresosTotal/ventasTotal : 0;
  var convPago      = clicsTotal>0 ? (ventasPago/clicsTotal)*100 : 0;
  var medios = P.medios.map(function(x){
    return {
      medio:x.medio, gasto:x.gasto, impresiones:x.impresiones, clics:x.clics, ventas:x.ventas, ingresos:x.ingresos,
      ctr: x.impresiones>0 ? (x.clics/x.impresiones)*100 : 0,
      cpc: x.clics>0 ? x.gasto/x.clics : 0,
      cpa: x.ventas>0 ? x.gasto/x.ventas : Infinity,
      conv: x.clics>0 ? (x.ventas/x.clics)*100 : 0,
      roas: x.gasto>0 ? x.ingresos/x.gasto : Infinity,
      share: gastoTotal>0 ? (x.gasto/gastoTotal)*100 : 0
    };
  });
  return { P:P, gastoTotal:gastoTotal, ventasPago:ventasPago, ingresosPago:ingresosPago,
    imprTotal:imprTotal, clicsTotal:clicsTotal, ingresosTotal:ingresosTotal, ventasTotal:ventasTotal,
    roasBlended:roasBlended, roasPago:roasPago, roasNeto:roasNeto, aov:aov, convPago:convPago, medios:medios };
}

function pnlHTML(m){
  var brutos = m.ingresosTotal;
  var comision = brutos * (COMISION_PCT/100);
  var neto = brutos - comision;
  var gasto = m.gastoTotal;
  var resultado = neto - gasto;
  var margen = brutos>0 ? (resultado/brutos)*100 : 0;
  var rCls = resultado>=0 ? "pos" : "negc";
  var signo = resultado<0 ? "\u2212" : "";
  function row(k,v,cls){ return '<div class="row '+(cls||"")+'"><span class="k">'+k+'</span><span class="v">'+v+'</span></div>'; }
  return '<div class="pnl">'+
    row("Ingresos brutos", fmtUSD(brutos)) +
    row("Comisi\u00F3n Hotmart ("+COMISION_PCT+"%)", "\u2212"+fmtUSD(comision), "neg") +
    row("Ingreso neto", fmtUSD(neto), "sub") +
    row("Gasto en publicidad", "\u2212"+fmtUSD(gasto), "neg") +
    '<div class="row total"><span class="k">Resultado</span><span class="v '+rCls+'">'+signo+fmtUSD(Math.abs(resultado))+
      '<span class="mrg">margen '+(margen>=0?"":"\u2212")+Math.abs(margen).toFixed(0)+'%</span></span></div>'+
  '</div>';
}

function chartSVG(serie){
  var W=820, H=280, padL=44, padR=12, padT=14, padB=34;
  var iw=W-padL-padR, ih=H-padT-padB;
  var maxV = Math.max.apply(null, serie.map(function(d){return Math.max(d.gasto,d.ingresos);}).concat([10]));
  maxV = Math.ceil(maxV/50)*50 || 50;
  var n=serie.length, slot=iw/n, bw=Math.min(34, slot*0.5);
  function y(v){ return padT + ih - (v/maxV)*ih; }
  function cx(i){ return padL + slot*i + slot/2; }
  var s='<svg viewBox="0 0 '+W+' '+H+'" width="100%" style="display:block">';
  for(var g=0; g<=4; g++){
    var val=maxV*g/4, yy=y(val);
    s+='<line x1="'+padL+'" y1="'+yy+'" x2="'+(W-padR)+'" y2="'+yy+'" stroke="#262626" stroke-width="1"/>';
    s+='<text x="'+(padL-8)+'" y="'+(yy+4)+'" fill="#8A8A85" font-size="11" font-family="Inter" text-anchor="end">$'+Math.round(val)+'</text>';
  }
  serie.forEach(function(d,i){
    var bh=(d.gasto/maxV)*ih, bx=cx(i)-bw/2, by=padT+ih-bh;
    s+='<rect x="'+bx+'" y="'+by+'" width="'+bw+'" height="'+bh+'" fill="#5A5A54" rx="2"/>';
  });
  var pts=serie.map(function(d,i){return cx(i)+","+y(d.ingresos);}).join(" ");
  s+='<polyline points="'+pts+'" fill="none" stroke="#C4D82E" stroke-width="2.5"/>';
  serie.forEach(function(d,i){ s+='<circle cx="'+cx(i)+'" cy="'+y(d.ingresos)+'" r="4" fill="#0A0A0A" stroke="#C4D82E" stroke-width="2.5"/>'; });
  serie.forEach(function(d,i){ s+='<text x="'+cx(i)+'" y="'+(H-12)+'" fill="#8A8A85" font-size="12" font-family="Inter" text-anchor="middle">'+d.dia+'</text>'; });
  s+='</svg>';
  return s;
}

function kpiHTML(lbl,val,sub,cls){
  return '<div class="kpi"><div class="lbl">'+lbl+'</div><div class="val '+(cls||"")+'">'+val+'</div><div class="sub">'+sub+'</div></div>';
}

function ecoHTML(m){
  function cell(lbl,val,nota,cls){
    return '<div class="cell"><div class="lbl">'+lbl+'</div><div class="val '+(cls||"")+'">'+val+'</div><div class="nota">'+nota+'</div></div>';
  }
  var roasNetoCls = isFinite(m.roasNeto) && m.roasNeto>=1 ? "accent" : (m.gastoTotal>0 && m.ingresosPago===0 ? "warn":"");
  return cell("Ticket promedio", fmtUSD(m.aov), "ingreso / ventas","") +
         cell("ROAS neto", fmtX(m.roasNeto), "tras "+COMISION_PCT+"% comisi\u00F3n", roasNetoCls) +
         cell("Break-even ROAS", fmtX(BREAKEVEN), "m\u00EDnimo para no perder","") +
         cell("Conversi\u00F3n pago", fmtPct(m.convPago), "ventas / clics","");
}

function repartoHTML(medios){
  var maxG=Math.max.apply(null, medios.map(function(x){return x.gasto;}).concat([1]));
  return medios.map(function(x){
    return '<div class="bar-row"><div class="bar-top"><span class="name">'+x.medio+'</span><span class="num">'+fmtUSD(x.gasto)+' &middot; '+fmtPct(x.share)+'</span></div><div class="bar-track"><div class="bar-fill" style="width:'+((x.gasto/maxG)*100)+'%"></div></div></div>';
  }).join("");
}

function fuentesHTML(m){
  function card(titulo,ventas,ingresos,nota,accent){
    return '<div class="fuente"><div class="lbl '+(accent?"accent":"")+'">'+titulo+'</div><div class="val">'+fmtUSD(ingresos)+'</div><div class="nota">'+fmtNum(ventas)+' '+(ventas===1?"venta":"ventas")+' &middot; '+nota+'</div></div>';
  }
  return card("Pago (atribuido)", m.ventasPago, m.ingresosPago, fmtUSD(m.gastoTotal)+" invertidos", false) +
         card("Ventas Hotmart", m.P.organico.ventas, m.P.organico.ingresos, "sin atribuci\u00F3n a medio", true);
}

function td(val,cls){ return '<td class="'+(cls||"")+'">'+val+'</td>'; }
function rowHTML(x){
  return '<tr>'+ td(x.medio,"bold")+ td(fmtUSD(x.gasto))+ td(fmtNum(x.impresiones))+ td(fmtNum(x.clics))+
    td(fmtPct(x.ctr))+ td(fmtUSD(x.cpc))+ td(fmtNum(x.ventas))+ td(fmtPct(x.conv))+
    td(isFinite(x.cpa)?fmtUSD(x.cpa):"\u2014")+
    td(fmtX(x.roas), x.gasto>0&&x.ingresos===0 ? "warn" : (isFinite(x.roas)&&x.roas>=1?"accent":""))+ '</tr>';
}

var PERIODO_DIAS = { "Ultimos 7 dias":7, "Ultimos 30 dias":30, "Ultimos 90 dias":90 };

function render(nombre){
  var P = construirPeriodo(PERIODO_DIAS[nombre]);
  var m = calc(P);
  var pagoSinRetorno = m.ingresosPago===0 && m.gastoTotal>0;

  var al=document.getElementById("alerta");
  if(pagoSinRetorno){
    al.classList.remove("hidden");
    document.getElementById("alerta-txt").innerHTML =
      "El gasto pago a&uacute;n no tiene ventas atribuidas (Hotmart no env&iacute;a la campa&ntilde;a de origen). "+
      "Las ventas del per&iacute;odo se muestran como total sin atribuir. ROAS blended: <b class='roas'>"+fmtX(m.roasBlended)+"</b>.";
  } else {
    al.classList.add("hidden");
  }

  document.getElementById("kpis").innerHTML =
    kpiHTML("Gasto total", fmtUSD(m.gastoTotal), "Meta + Google (USD)","") +
    kpiHTML("Ventas", fmtNum(m.ventasTotal), fmtUSD(m.ingresosTotal)+" en ingresos","") +
    kpiHTML("ROAS blended", fmtX(m.roasBlended), "ingreso total / gasto","accent") +
    kpiHTML("Resultado", (function(){var b=m.ingresosTotal,c=b*(COMISION_PCT/100),r=b-c-m.gastoTotal;return (r<0?"\u2212":"")+fmtUSD(Math.abs(r));})(), "tras comisi\u00F3n y ads", (function(){var b=m.ingresosTotal,c=b*(COMISION_PCT/100),r=b-c-m.gastoTotal;return r>=0?"accent":"warn";})());

  document.getElementById("tab-resumen").innerHTML =
    '<div class="sec">Estado de resultados</div>'+
    pnlHTML(m)+
    '<div class="sec" style="margin-top:36px">Econom\u00EDa unitaria</div>'+
    '<div class="eco">'+ecoHTML(m)+'</div>'+
    '<div class="sec" style="margin-top:36px">Gasto vs ingresos en el tiempo</div>'+
    '<div style="margin-top:18px">'+chartSVG(m.P.serie)+'</div>'+
    '<div class="leyenda"><span><span class="dot" style="background:#5A5A54"></span>Gasto pago</span><span><span class="dot" style="background:#C4D82E"></span>Ingresos (ventas Hotmart)</span></div>'+
    '<div class="fuentes">'+fuentesHTML(m)+'</div>'+
    '<div class="sec" style="margin-top:36px">Reparto del gasto</div>'+
    '<div style="margin-top:16px">'+repartoHTML(m.medios)+'</div>';

  var cols=["Medio","Gasto","Impr.","Clics","CTR","CPC","Ventas","Conv.","CPA","ROAS"];
  document.getElementById("tab-medios").innerHTML =
    '<div class="scroll"><table><thead><tr>'+cols.map(function(c){return '<th>'+c+'</th>';}).join("")+'</tr></thead><tbody>'+
    m.medios.map(rowHTML).join("")+
    '<tr>'+ td("Total pago","bold")+ td(fmtUSD(m.gastoTotal),"bold")+ td(fmtNum(m.imprTotal))+ td(fmtNum(m.clicsTotal))+
      td("\u2014")+ td("\u2014")+ td(fmtNum(m.ventasPago),"bold")+ td(fmtPct(m.convPago))+ td("\u2014")+
      td(fmtX(m.roasPago), pagoSinRetorno?"bold warn":("bold"+(m.roasPago>=1?" accent":"")))+'</tr>'+
    '</tbody></table></div>';
}

/* ---------- Init: leer las 3 solapas y arrancar ---------- */
function initSelector(){
  var sel=document.getElementById("sel-periodo");
  Object.keys(PERIODO_DIAS).forEach(function(nombre){
    var o=document.createElement("option");
    o.value=nombre; o.textContent=nombre.replace(/Ultimos/,"\u00DAltimos").replace(/dias/,"d\u00EDas");
    if(nombre==="Ultimos 30 dias") o.selected=true;
    sel.appendChild(o);
  });
  sel.addEventListener("change", function(){ render(sel.value); });

  var btns=document.querySelectorAll(".tab");
  btns.forEach(function(b){
    b.addEventListener("click",function(){
      btns.forEach(function(x){x.classList.remove("on");});
      b.classList.add("on");
      var t=b.getAttribute("data-tab");
      document.getElementById("tab-resumen").classList.toggle("hidden", t!=="resumen");
      document.getElementById("tab-medios").classList.toggle("hidden", t!=="medios");
    });
  });
}

function arrancar(){
  var est=document.getElementById("estado");
  est.textContent = "Cargando datos desde Google Sheets\u2026";
  Promise.all([
    fetchSolapa(SOLAPA_GOOGLE),
    fetchSolapa(SOLAPA_META),
    fetchSolapa(SOLAPA_VENTAS)
  ]).then(function(res){
    RAW.google = res[0].rows;
    RAW.meta   = res[1].rows;
    RAW.ventas = res[2].rows;
    est.textContent = "";
    initSelector();
    render("Ultimos 30 dias");
    var ls=document.getElementById("last-sync");
    if(ls) ls.textContent = "actualizado " + new Date().toLocaleString("es-AR");
  }).catch(function(err){
    est.innerHTML = "<span style='color:#C46A2E'>No se pudieron leer los datos. "+
      "Verific\u00E1 que la planilla est\u00E9 compartida como <b>\u201CCualquiera con el enlace, lector\u201D</b> "+
      "y que las solapas se llamen exactamente <b>Google Ads</b>, <b>Meta Ads</b> y <b>Ventas</b>.<br>"+
      "Detalle: "+err.message+"</span>";
  });
}

arrancar();
</script>
</body>
</html>
